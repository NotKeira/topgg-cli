name: Release Promotion

on:
  push:
    branches:
      - dev
    paths:
      - VERSION

permissions:
  contents: read
  pull-requests: write

jobs:
  promote-release-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Read and classify version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(tr -d '[:space:]' < VERSION)"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "channel=rc" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "channel=stable" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "channel=invalid" >> "$GITHUB_OUTPUT"
            echo "Skipping PR creation: VERSION must be x.y.z or x.y.z-rc.n (found $VERSION)"
          fi

      - name: Create or update release PR
        if: steps.version.outputs.is_release == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const base = 'main';
            const head = 'dev';
            const version = '${{ steps.version.outputs.value }}';
            const channel = '${{ steps.version.outputs.channel }}';

            const { data: openPulls } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              base,
              head: `${owner}:${head}`
            });

            const title = channel === 'rc'
              ? `Release candidate ${version}`
              : `Release ${version}`;
            const body = [
              'Automated release promotion from dev to main.',
              '',
              `Version: ${version}`,
              `Channel: ${channel}`,
              '',
              'This PR was generated because VERSION contains an allowed release format.'
            ].join('\n');

            if (openPulls.length > 0) {
              const pr = openPulls[0];
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: pr.number,
                title,
                body
              });
              core.info(`Updated existing PR #${pr.number}`);
              return;
            }

            const created = await github.rest.pulls.create({
              owner,
              repo,
              title,
              body,
              head,
              base
            });

            core.info(`Created PR #${created.data.number}`);
