name: Project Standards

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main

permissions:
  contents: read

jobs:
  required-files:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Verify required project files
        shell: bash
        run: |
          set -euo pipefail

          required_files=(
            "README.md"
            "CHANGELOG.md"
            "CONTRIBUTING.md"
            "SECURITY.md"
            "CODE_OF_CONDUCT.md"
            "CODEOWNERS"
            "LICENSE"
            "VERSION"
          )

          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing required file: $file"
              exit 1
            fi
          done

  security-contact:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Confirm security contact address
        shell: bash
        run: |
          set -euo pipefail
          grep -q "security@keirahopkins.co.uk" SECURITY.md
